[EXCHANGE]
SYMBOL = BTCUSDT
LEVERAGE = 20
TIMEFRAME = 15
BASE_URL = https://api.bybit.com

[TELEGRAM]
ENABLED = true
# Set via environment variable: TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID
# Or fill directly below (less secure)
BOT_TOKEN =
CHAT_ID =
# Notify on these events (true/false)
NOTIFY_ENTRY = true
NOTIFY_CLOSE = true
NOTIFY_TRAIL = true
NOTIFY_FLIP = true
NOTIFY_EXPANSION = true
NOTIFY_EXHAUSTION = false
NOTIFY_ERROR = true

[SIGNAL]
# Minimum candles squeeze must be active before firing
SQUEEZE_MIN_CANDLES = 3
# Volume ratio minimum to confirm expansion
VOL_RATIO_MIN = 1.3
# Minimum price move to cover fees (0.35% = Bybit taker fee x2)
MIN_MOVE_PCT = 0.35

[EXHAUSTION]
# Blow-off: candle range > N * ATR_14
ATR_BLOW_MULT = 2.0
# Climactic volume: vol > N * vol_sma20
VOL_CLIMAX_MULT = 3.0
# Too long squeeze = stale, skip
SQUEEZE_STALE_LIMIT = 20

[RISK]
# RR minimum: TP >= entry + RR_MIN * SL_distance
RR_MIN = 1.5
# Trailing SL method: SWING or KC
TRAIL_METHOD = SWING

[INDICATOR]
# Bollinger Bands
BB_PERIOD = 20
BB_STD = 2.0
# Keltner Channel
KC_PERIOD = 20
KC_ATR_MULT = 1.5
# ATR
ATR_PERIOD = 14
# RSI
RSI_PERIOD = 14
RSI_DIVERGENCE_LOOKBACK = 5
# Volume SMA
VOL_SMA_PERIOD = 20

[DRY_RUN]
ENABLED = true
LOG_SIGNALS = true
